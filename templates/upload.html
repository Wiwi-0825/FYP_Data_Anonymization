<!DOCTYPE html>
<html>
<head>
<title>Secure Data</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,
rgba(37,99,235,.25),
transparent 30%),

linear-gradient(
135deg,
#020617,
#030712,
#111827
);

color:white;
padding:30px;
}

.card{

width:760px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:0.5px solid rgba(255,255,255,.08);

border-radius:35px;

padding:38px;

box-shadow:
0 0 60px rgba(0,0,0,.35);

text-align:center;
}

.logo{

font-size:60px;
margin-bottom:15px;

}

h1{

font-size:38px;
margin-bottom:10px;

}

.gradient{

background:linear-gradient(
90deg,
#38bdf8,
#a855f7
);

-webkit-background-clip:text;
color:transparent;

}

.subtitle{

color:#cbd5e1;
margin-bottom:28px;

font-size:16px;

}

.drop-zone{

position:relative;

height:180px;

border:2px dashed rgba(255,255,255,.2);

border-radius:30px;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

background:rgba(255,255,255,.03);

transition:.3s;

cursor:pointer;
}

.drop-zone.dragover{

border-color:#60a5fa;

background:
rgba(96,165,250,.12);

transform:scale(1.02);

}

.upload-icon{

font-size:48px;
margin-bottom:15px;

}

.drop-title{

font-size:20px;
font-weight:700;

}

.drop-sub{

margin-top:10px;

color:#94a3b8;

font-size:14px;
}

.file-name{

margin-top:20px;
color:#34d399;
font-weight:600;

}

input{

position:absolute;
width:100%;
height:100%;
opacity:0;

cursor:pointer;

}

button{

width:100%;

margin-top:35px;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(
90deg,
#3b82f6,
#9333ea
);

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 35px rgba(59,130,246,.4);

}

.footer{

margin-top:25px;
font-size:13px;
color:#94a3b8;

}

</style>
</head>

<body>

<div class="card">

<div class="logo">🔒</div>

<h1>
Secure
<span class="gradient">
Data Anonymizer
</span>
</h1>

<div class="subtitle">
Upload PDF, CSV, TXT or Excel files securely
</div>

<form
action="/upload"
method="POST"
enctype="multipart/form-data"
>

<div
class="drop-zone"
id="dropZone"
>

<input
type="file"
name="file"
id="fileInput"
accept=".txt,.csv,.xlsx,.pdf"
required
>

<div class="upload-icon">
☁️
</div>

<div class="drop-title">
Drag & Drop File Here
</div>

<div class="drop-sub">
or click to browse
</div>

<div
class="file-name"
id="fileName"
></div>

</div>

<button type="submit">
Continue →
</button>

</form>

<div class="footer">
Files are processed temporarily and not permanently stored
</div>

</div>


<script>

const dropZone =
document.getElementById("dropZone")

const fileInput =
document.getElementById("fileInput")

const fileName=
document.getElementById("fileName")


dropZone.addEventListener(
"dragover",
(e)=>{

e.preventDefault()

dropZone.classList.add(
"dragover"
)

}
)


dropZone.addEventListener(
"dragleave",
()=>{

dropZone.classList.remove(
"dragover"
)

}
)


dropZone.addEventListener(
"drop",
(e)=>{

e.preventDefault()

dropZone.classList.remove(
"dragover"
)

if(
e.dataTransfer.files.length
){

fileInput.files =
e.dataTransfer.files

fileName.innerText=
"✓ "
+
e.dataTransfer.files[0].name

}

}
)


fileInput.addEventListener(
"change",
()=>{

if(
fileInput.files.length
){

fileName.innerText=
"✓ "
+
fileInput.files[0].name

}

}
)

</script>

</body>
</html>
